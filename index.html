<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLUB V TEST</title>
    <meta name="description" content="Club Swinger Exclusivo en Chía. Donde tus fantasías cobran vida." />
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"> 
    
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    

  
    <style>
      :root {
        --color-bg-black: #000000;
        --color-bg-dark-red: #2a0000;
        --color-red-primary: #D32F2F;
        --color-red-accent: #FF1744;
        --color-gold: #F4A261;
        
        /* Ultra organic shapes */
        --radius-sm: 30px;
        --radius-md: 50px;
        --radius-lg: 80px;
        --radius-xl: 100px;
        
        /* Intense Glows */
        --shadow-glow: 0 0 30px rgba(211, 47, 47, 0.5), 0 0 60px rgba(211, 47, 47, 0.2);
        --shadow-intense: 0 0 50px rgba(255, 23, 68, 0.6), 0 0 100px rgba(255, 23, 68, 0.3);
        --text-glow: 0 0 10px #D32F2F, 0 0 20px #FF1744, 0 0 40px #FF1744;
        
        --transition-slow: all 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        --transition-med: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }

      body {
        background-color: var(--color-bg-black);
        background: linear-gradient(to bottom, #000000, #1a0000, #2a0000, #000000);
        color: #FFFFFF;
        font-family: 'Montserrat', sans-serif;
        overflow-x: hidden;
      }

      h1, h2, h3, h4, h5 {
        font-family: 'Playfair Display', serif;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 10px; }
      ::-webkit-scrollbar-track { background: #000; }
      ::-webkit-scrollbar-thumb { background: linear-gradient(to bottom, var(--color-red-primary), var(--color-bg-dark-red)); border-radius: 10px; }

      /* "Wet" Glassmorphism */
      .bg-glass-wet {
        background: rgba(20, 0, 0, 0.6);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border: 1px solid rgba(255, 23, 68, 0.15);
        box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      }

      .text-glow-red {
        text-shadow: var(--text-glow);
      }

      /* Button Styles */
      .btn-sensual-red {
        background: linear-gradient(135deg, #8B0000, var(--color-red-primary));
        border: none;
        color: white;
        padding: 18px 50px;
        font-weight: 800;
        letter-spacing: 2px;
        text-transform: uppercase;
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow-glow);
        transition: var(--transition-med);
        position: relative;
        overflow: hidden;
        z-index: 1;
      }

      .btn-sensual-red::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(135deg, var(--color-red-primary), #FF1744);
        opacity: 0;
        z-index: -1;
        transition: var(--transition-med);
      }

      .btn-sensual-red:hover {
        transform: scale(1.05);
        box-shadow: var(--shadow-intense);
        color: white;
      }

      .btn-sensual-red:hover::before {
        opacity: 1;
      }

      .btn-sensual-yellow {
        background: transparent;
        border: 2px solid var(--color-gold);
        color: var(--color-gold);
        padding: 18px 40px;
        font-weight: 700;
        border-radius: var(--radius-xl);
        transition: var(--transition-med);
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .btn-sensual-yellow:hover {
        background: rgba(244, 162, 97, 0.15);
        box-shadow: 0 0 40px rgba(244, 162, 97, 0.4);
        color: #fff;
        border-color: #fff;
        text-shadow: 0 0 10px var(--color-gold);
      }

      /* Animations */
      @keyframes pulse-red-intense {
        0% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.8); }
        70% { box-shadow: 0 0 0 25px rgba(211, 47, 47, 0); }
        100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); }
      }

      .animate-pulse-glow {
        animation: pulse-red-intense 2.5s infinite;
      }

      .section-padding {
        padding: 8rem 0;
      }

      /* Form inputs */
      .input-organic {
        background: rgba(40, 0, 0, 0.3);
        border: 1px solid rgba(255, 23, 68, 0.2);
        border-radius: var(--radius-md);
        color: white;
        padding: 1.5rem 2rem;
        transition: var(--transition-med);
        width: 100%;
        font-size: 1.1rem;
      }
      .input-organic:focus {
        background: rgba(60, 0, 0, 0.5);
        border-color: var(--color-red-primary);
        box-shadow: 0 0 30px rgba(211, 47, 47, 0.4);
        outline: none;
      }

      @media (max-width: 768px) {
        .section-padding { padding: 5rem 0; }
        h1 { font-size: 3.5rem !important; }
        .btn-sensual-red { padding: 15px 30px; font-size: 0.9rem; }
      }
    </style>


</head>
  <body>
<div id="root">
  <div id="initial-loader">
    <style>
      body{
        margin:0;
        background:black;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        font-family:sans-serif;
      }

      .loader-logo{
        color:white;
        font-size:32px;
        letter-spacing:6px;
        animation:pulse 1.5s infinite;
      }

      @keyframes pulse{
        0%{opacity:.4}
        50%{opacity:1}
        100%{opacity:.4}
      }
    </style>

    <div class="loader-logo">
      CLUB V
    </div>
  </div>
</div>    <!-- Bootstrap JS Bundle -->
